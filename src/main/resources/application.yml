server:
  port: 8080
  servlet:
    context-path: /api
  profiles:
    active: local

spring:
  application:
    name: ai-knowledge-base

  # 数据源配置 (MySQL)
  datasource:
    url: jdbc:mysql://localhost:3306/ai_knowledge_base?useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: xxx
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update  # 自动更新表结构，生产环境建议用 validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# AI配置（替换为你的实际API Key）
ai:
  api:
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api-key: {{your_api_key_here}}
    chat-model: qwen-turbo
    embedding-model: text-embedding-v4
    max-tokens: 2048
    temperature: 0.7
    timeout-seconds: 120  # 超时时间增加到120秒，长文档处理需要更长时间
    # 如果使用兼容接口（如 SiliconFlow / 智谱 / 通义）请修改以上配置

# Milvus向量数据库配置
milvus:
  host: {your_milvus_host_here}
  port: 19530
  collection-name: knowledge_base
  dimension: 1024  # text-embedding-v2 维度（通义千问）
  enabled: true  # 如果没有Milvus，设为false则使用内存向量库

# RAG配置（优化版 - 三阶段流水线）
rag:
  # 基础切分配置
  chunk-size: 500
  chunk-overlap: 50
  markdown:
    chunk-size: 400
    chunk-overlap: 50
  
  # 阶段1：混合检索配置（Hybrid Search）
  # 整合语义检索(向量) + 精确检索(BM25关键词)，提高召回率
  hybrid-search:
    enabled: false             # 是否启用混合检索（false则退化为纯向量检索）
    vector-top-k: 8            # 向量检索召回数量（适度扩大，为后续筛选留空间）
    keyword-top-k: 8           # 关键词检索召回数量
    rrf-k: 60                  # RRF融合参数（标准值60，越大排名影响越小）
    candidate-top-k: 8         # 融合后的候选数量
  
  # 阶段2：重排序配置（Rerank）
  # 对候选文档进行精细化排序，选出最相关的文档
  rerank:
    enabled: false              # 是否启用重排序
    strategy: cross-encoder    # 策略: cross-encoder(最准) / hybrid-score(快速) / rrf-only(最快)
    final-top-k: 3             # 最终精选文档数（送给LLM的参考数量）
    batch-size: 8              # Cross-Encoder批量大小（控制API调用频率）
  
  # 阈值过滤（兜底保护）
  similarity-threshold: 0.3    # 最低相似度阈值
  top-k: 8                     # 降级模式的top-k（混合检索关闭时使用）

# 对话上下文配置
conversation:
  max-history-turns: 10    # 最多保留10轮对话
  session-ttl-minutes: 30  # 会话30分钟过期

# 线程池配置
thread-pool:
  core-size: 10
  max-size: 50
  queue-capacity: 200
  keep-alive-seconds: 60

# Actuator监控
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# 日志配置
logging:
  level:
    com.aiknowledge: debug
    org.springframework: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n"
  file:
    name: logs/ai-knowledge-base.log
